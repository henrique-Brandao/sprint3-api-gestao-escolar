<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Escolar Sprint3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main id="authScreen" class="auth-screen">
    <section class="auth-panel">
      <div class="brand-block">
        <span class="brand-mark">SE</span>
        <div>
          <h1>Portal Escolar</h1>
          <p>Gestão acadêmica para alunos, professores e direção.</p>
        </div>
      </div>

      <div id="loginCard" class="auth-card">
        <h2>Entrar</h2>
        <form id="loginForm" class="vstack gap-3">
          <div>
            <label class="form-label" for="emailInput">Email</label>
            <input id="emailInput" class="form-control" type="email" autocomplete="username" required>
          </div>
          <div>
            <label class="form-label" for="senhaInput">Senha</label>
            <input id="senhaInput" class="form-control" type="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>
        <div class="preset-row">
          <button class="btn btn-sm btn-outline-secondary preset-login" data-email="diretor@sprint3.com">Diretor</button>
          <button class="btn btn-sm btn-outline-secondary preset-login" data-email="professor@sprint3.com">Professor</button>
          <button class="btn btn-sm btn-outline-secondary preset-login" data-email="aluno@sprint3.com">Aluno</button>
        </div>
        <button id="showAccessRequestBtn" class="link-button" type="button">Solicitar acesso</button>
      </div>

      <div id="accessCard" class="auth-card d-none">
        <h2>Solicitar acesso</h2>
        <form id="accessForm" class="vstack gap-3">
          <div>
            <label class="form-label" for="accessNome">Nome</label>
            <input id="accessNome" class="form-control" required maxlength="80">
          </div>
          <div>
            <label class="form-label" for="accessEmail">Email</label>
            <input id="accessEmail" class="form-control" type="email" required maxlength="120">
          </div>
          <div>
            <label class="form-label" for="accessTipo">Tipo de solicitação</label>
            <select id="accessTipo" class="form-select" required>
              <option value="Aluno">Aluno</option>
              <option value="Professor">Professor</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="accessMensagem">Mensagem</label>
            <textarea id="accessMensagem" class="form-control" rows="3" maxlength="500"></textarea>
          </div>
          <button class="btn btn-primary w-100" type="submit">Enviar solicitação</button>
        </form>
        <button id="showLoginBtn" class="link-button" type="button">Voltar para login</button>
      </div>
      <div id="authAlert"></div>
    </section>
  </main>

  <main id="portalScreen" class="portal-shell d-none">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-mark">SE</span>
        <strong>Portal Escolar</strong>
      </div>
      <nav id="menuArea" class="menu-area"></nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p id="roleLabel" class="role-label">Portal</p>
          <h1 id="portalTitle">Portal Escolar</h1>
        </div>
        <div class="user-actions">
          <span id="userBadge" class="user-badge"></span>
          <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Sair</button>
        </div>
      </header>

      <div id="alertArea"></div>
      <section id="summaryArea" class="summary-grid"></section>

      <section class="data-panel">
        <div class="panel-head">
          <div>
            <h2 id="pageTitle">Dados</h2>
            <p id="pageSubtitle"></p>
          </div>
          <div class="d-flex gap-2">
            <button id="newBtn" class="btn btn-primary btn-sm">Novo</button>
          </div>
        </div>
        <div id="dashboardArea" class="dashboard-area d-none"></div>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <div class="modal fade" id="entityModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="entityForm">
          <div class="modal-header">
            <h5 id="modalTitle" class="modal-title">Cadastro</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div id="modalBody" class="modal-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="approvalModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="approvalForm">
          <input id="approvalRequestId" type="hidden">
          <div class="modal-header">
            <h5 class="modal-title">Aprovar solicitação</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <div id="approvalAlert"></div>
            <div class="mb-3">
              <label class="form-label" for="approvalPassword">Senha inicial</label>
              <input id="approvalPassword" class="form-control" type="password" autocomplete="new-password" minlength="6" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="approvalPasswordConfirm">Confirmar senha</label>
              <input id="approvalPasswordConfirm" class="form-control" type="password" autocomplete="new-password" minlength="6" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Aprovar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="requestDetailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Detalhes da solicitação</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div id="requestDetailsBody" class="modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
          <button id="requestRejectBtn" type="button" class="btn btn-outline-danger">Recusar</button>
          <button id="requestApproveBtn" type="button" class="btn btn-primary">Aprovar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
