<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sprint3 - Sistema Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">Sprint3 Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><button class="nav-link active btn btn-link" data-page="alunos">Alunos</button></li>
          <li class="nav-item"><button class="nav-link btn btn-link" data-page="professores">Professores</button></li>
          <li class="nav-item"><button class="nav-link btn btn-link" data-page="disciplinas">Disciplinas</button></li>
          <li class="nav-item"><button class="nav-link btn btn-link" data-page="notas">Notas</button></li>
        </ul>
        <div class="d-flex gap-2 align-items-center">
          <span id="userBadge" class="badge text-bg-secondary">Não autenticado</span>
          <button id="logoutBtn" class="btn btn-outline-light btn-sm d-none">Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section id="loginSection" class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <h1 class="h4 mb-1">Login</h1>
            <p class="text-muted mb-0">Faça login para consumir a API com JWT.</p>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="emailInput">Email</label>
            <input id="emailInput" class="form-control" value="admin@sprint3.com">
          </div>
          <div class="col-md-2">
            <label class="form-label" for="senhaInput">Senha</label>
            <input id="senhaInput" type="password" class="form-control" value="123456">
          </div>
          <div class="col-md-3 d-grid gap-2">
            <button id="loginBtn" class="btn btn-primary">Entrar</button>
          </div>
        </div>
        <div class="mt-3 d-flex flex-wrap gap-2">
          <button class="btn btn-sm btn-outline-secondary preset-login" data-email="admin@sprint3.com">Admin</button>
          <button class="btn btn-sm btn-outline-secondary preset-login" data-email="professor@sprint3.com">Professor</button>
          <button class="btn btn-sm btn-outline-secondary preset-login" data-email="aluno@sprint3.com">Aluno</button>
        </div>
      </div>
    </section>

    <div id="alertArea"></div>

    <section class="card shadow-sm">
      <div class="card-header bg-white d-flex flex-wrap gap-2 justify-content-between align-items-center">
        <div>
          <h2 id="pageTitle" class="h4 mb-0">Alunos</h2>
          <small id="pageSubtitle" class="text-muted">Gerencie os alunos cadastrados.</small>
        </div>
        <div class="d-flex gap-2">
          <button id="reloadBtn" class="btn btn-outline-secondary btn-sm">Atualizar</button>
          <button id="newBtn" class="btn btn-success btn-sm">Novo</button>
        </div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="entityModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="entityForm">
          <div class="modal-header">
            <h5 id="modalTitle" class="modal-title">Cadastro</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div id="modalBody" class="modal-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
